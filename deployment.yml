apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-name
  namespace: deployment-ns
  labels:
    app: deployment-label
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-pod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: nginx-pod
    spec:
      restartPolicy: Always
      volumes:
        - name: emptydir-storage
          emptyDir: {}
      containers:
        - name: nginx-container
          image: nginx:1.25
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: emptydir-storage
              mountPath: /logs
